<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product Review Form — WDD131">
    <meta name="author" content="Victor Henriquez">
    <title>Product Review</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>

    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html" id="review-form">

            <!-- Product Name -->
            <div class="field-group">
                <label for="product">Product Name</label>
                <select id="product" name="product" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

            <!-- Overall Rating -->
            <div class="field-group">
                <fieldset class="rating-fieldset">
                    <legend>Overall Rating</legend>
                    <div class="star-row">
                        <label class="star-label">
                            <input type="radio" id="rating1" name="rating" value="1" required>
                            <span>&#9734;</span>
                        </label>
                        <label class="star-label">
                            <input type="radio" id="rating2" name="rating" value="2">
                            <span>&#9734;&#9734;</span>
                        </label>
                        <label class="star-label">
                            <input type="radio" id="rating3" name="rating" value="3">
                            <span>&#9734;&#9734;&#9734;</span>
                        </label>
                        <label class="star-label">
                            <input type="radio" id="rating4" name="rating" value="4">
                            <span>&#9734;&#9734;&#9734;&#9734;</span>
                        </label>
                        <label class="star-label">
                            <input type="radio" id="rating5" name="rating" value="5">
                            <span>&#9734;&#9734;&#9734;&#9734;&#9734;</span>
                        </label>
                    </div>
                </fieldset>
            </div>

            <!-- Date of Installation -->
            <div class="field-group">
                <label for="install-date">Date of Installation</label>
                <input type="date" id="install-date" name="installDate" required>
            </div>

            <!-- Useful Features -->
            <div class="field-group">
                <fieldset class="check-fieldset">
                    <legend>Which features did you find useful in the product?<br><em>(Check all that apply)</em></legend>
                    <label class="check-label">
                        <input type="checkbox" id="feature-durability" name="features" value="durability">
                        Durability
                    </label>
                    <label class="check-label">
                        <input type="checkbox" id="feature-ease" name="features" value="ease-of-use">
                        Ease of Use
                    </label>
                    <label class="check-label">
                        <input type="checkbox" id="feature-performance" name="features" value="performance">
                        Performance
                    </label>
                    <label class="check-label">
                        <input type="checkbox" id="feature-design" name="features" value="design">
                        Design
                    </label>
                </fieldset>
            </div>

            <!-- Written Review -->
            <div class="field-group">
                <label for="written-review">Written Review <span class="optional">(Optional)</span></label>
                <textarea id="written-review" name="writtenReview" rows="5" placeholder="Share your experience with this product..."></textarea>
            </div>

            <!-- User Name -->
            <div class="field-group">
                <label for="username">Your Name <span class="optional">(Optional)</span></label>
                <input type="text" id="username" name="username" placeholder="Your name">
            </div>

            <!-- Submit -->
            <div class="field-group">
                <input type="submit" value="Post Review">
            </div>

        </form>
    </main>

    <footer>
        <p>© <span id="currentyear"></span> Victor Henriquez | Mérida, Venezuela</p>
        <p id="lastModified"></p>
    </footer>

</body>
</html>
