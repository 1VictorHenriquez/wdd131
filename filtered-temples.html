<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A filtered photo album of LDS temples around the world.">
    <meta name="author" content="Victor Henriquez">
    <title>Temple Album - Filtered</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/filtered-temples.css">
    <script src="scripts/filtered-temples.js" defer></script>
</head>
<body>
    <header>
        <p>Temple Album</p>
        <button id="hamburger">&#9776;</button>
        <nav>
            <a href="#" data-filter="all">Home</a>
            <a href="#" data-filter="old">Old</a>
            <a href="#" data-filter="new">New</a>
            <a href="#" data-filter="large">Large</a>
            <a href="#" data-filter="small">Small</a>
        </nav>
    </header>

    <main>
        <h1 id="filter-title">Home</h1>
        <div class="gallery" id="gallery"></div>
    </main>

    <footer>
        <p>© <span id="currentyear"></span> Victor Henriquez, Venezuela</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
