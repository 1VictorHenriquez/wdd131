<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book of Mormon Chapters</title>
    <link rel="stylesheet" href="styles/bom.css">
</head>
<body>
    <main>
        <h1>My Favorite Book of Mormon Chapters</h1>
        <form id="chapter-form" action="" onsubmit="return false;">
            <label for="favchap">Chapter:</label>
            <input type="text" id="favchap" placeholder="Alma 5">
            <button type="button" id="add-btn">Add</button>
        </form>
        <ul id="chapters"></ul>
    </main>
    <script src="scripts/bom.js"></script>
</body>
</html>
